name: Apply contractor input integration

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-contractor-input.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Integrate contractor assignment safely
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          index_path = Path("index.html")
          sw_path = Path("service-worker.js")
          workflow_path = Path(".github/workflows/apply-contractor-input.yml")

          script_tag = '<script src="./contractor-assignment.js" defer></script>'
          head_anchor = '<meta name="msapplication-TileColor" content="#0a0e1a">'
          sheetjs_anchor = '<script>/*! xlsx.js'

          index_text = index_path.read_text(encoding="utf-8")

          if script_tag not in index_text:
              if index_text.count(head_anchor) != 1:
                  raise RuntimeError("Expected one stable head anchor")
              index_text = index_text.replace(
                  head_anchor,
                  head_anchor + "\n" + script_tag,
                  1,
              )
              index_path.write_text(index_text, encoding="utf-8")

          final_index = index_path.read_text(encoding="utf-8")
          if final_index.count(script_tag) != 1:
              raise RuntimeError("Expected exactly one contractor assignment script tag")

          tag_pos = final_index.find(script_tag)
          anchor_pos = final_index.find(head_anchor)
          sheetjs_pos = final_index.find(sheetjs_anchor)
          if not (anchor_pos < tag_pos < sheetjs_pos):
              raise RuntimeError("Contractor assignment script tag is not in the document head")

          sw_text = sw_path.read_text(encoding="utf-8")
          old_cache_line = "const CACHE_NAME = 'hpal-production-monitor-v1.7.1-emergency-rollback';"
          new_cache_line = "const CACHE_NAME = 'hpal-production-monitor-v1.7.2-direct-index-integration';"
          if old_cache_line in sw_text:
              sw_text = sw_text.replace(old_cache_line, new_cache_line, 1)
          elif new_cache_line not in sw_text:
              raise RuntimeError("Unexpected service-worker cache version")

          enhancement_entry = "  './contractor-assignment.js',\n"
          if enhancement_entry not in sw_text:
              manifest_entry = "  './manifest.webmanifest',\n"
              if manifest_entry not in sw_text:
                  raise RuntimeError("Could not locate manifest entry in APP_SHELL")
              sw_text = sw_text.replace(
                  manifest_entry,
                  manifest_entry + enhancement_entry,
                  1,
              )

          if "injectContractorEnhancement" in sw_text:
              raise RuntimeError("Unsafe HTML transformation code is still present")

          sw_path.write_text(sw_text, encoding="utf-8")
          workflow_path.unlink()
          PY

      - name: Validate JavaScript and integration
        shell: bash
        run: |
          node --check contractor-assignment.js
          node --check service-worker.js
          python3 - <<'PY'
          from pathlib import Path

          html = Path("index.html").read_text(encoding="utf-8")
          tag = '<script src="./contractor-assignment.js" defer></script>'
          anchor = '<meta name="msapplication-TileColor" content="#0a0e1a">'
          sheetjs = '<script>/*! xlsx.js'
          assert html.count(tag) == 1
          assert html.find(anchor) < html.find(tag) < html.find(sheetjs)

          sw = Path("service-worker.js").read_text(encoding="utf-8")
          assert "hpal-production-monitor-v1.7.2-direct-index-integration" in sw
          assert "'./contractor-assignment.js'" in sw
          assert "injectContractorEnhancement" not in sw
          PY

      - name: Commit integrated application
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html service-worker.js .github/workflows/apply-contractor-input.yml
          git commit -m "Integrate unmatched contractor input safely in index"
          git push origin main
